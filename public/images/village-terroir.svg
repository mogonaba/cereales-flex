<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration d'un village avec une femme étalant du maïs à sécher au soleil">
  <defs>
    <linearGradient id="ciel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7D98C"/>
      <stop offset="55%" stop-color="#F0B25E"/>
      <stop offset="100%" stop-color="#E8AC3D"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C1622D"/>
      <stop offset="100%" stop-color="#8F471E"/>
    </linearGradient>
    <radialGradient id="soleil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3D0"/>
      <stop offset="100%" stop-color="#F4C15A"/>
    </radialGradient>
  </defs>

  <!-- Ciel -->
  <rect x="0" y="0" width="900" height="380" fill="url(#ciel)"/>
  <circle cx="740" cy="100" r="70" fill="url(#soleil)" opacity="0.9"/>

  <!-- Oiseaux -->
  <path d="M120 70 q10 -12 20 0 q10 -12 20 0" stroke="#6B4226" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M180 100 q8 -10 16 0 q8 -10 16 0" stroke="#6B4226" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Collines lointaines -->
  <path d="M0 300 Q150 250 300 300 T600 290 T900 310 V380 H0 Z" fill="#A9702F" opacity="0.55"/>

  <!-- Baobab -->
  <g transform="translate(80,150)">
    <path d="M40 230 C 35 170, 30 140, 45 90 C 50 70, 35 55, 45 40 C 50 30, 65 30, 65 45 C 75 30, 90 35, 85 50 C 100 45, 108 60, 95 72 C 105 85, 95 100, 80 95 C 85 130, 70 170, 60 230 Z" fill="#6B4226"/>
    <ellipse cx="55" cy="35" rx="55" ry="26" fill="#355E3B"/>
    <ellipse cx="20" cy="50" rx="30" ry="16" fill="#2F5233"/>
    <ellipse cx="95" cy="48" rx="28" ry="15" fill="#2F5233"/>
  </g>

  <!-- Case traditionnelle en terre avec toit de chaume -->
  <g transform="translate(650,190)">
    <ellipse cx="70" cy="150" rx="90" ry="14" fill="#00000022"/>
    <circle cx="70" cy="110" r="65" fill="#D8A15C"/>
    <path d="M2 100 Q70 30 138 100 L150 115 Q70 55 -10 115 Z" fill="#8A5A2B"/>
    <path d="M8 108 Q70 45 132 108 L138 118 Q70 65 2 118 Z" fill="#6B4226"/>
    <rect x="55" y="115" width="30" height="45" rx="4" fill="#4A2F18"/>
  </g>

  <!-- Sol / cour du village -->
  <path d="M0 340 Q450 300 900 345 V560 H0 Z" fill="url(#sol)"/>
  <path d="M0 360 Q450 325 900 365" stroke="#7A3E1B" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Panier tressé à côté -->
  <g transform="translate(660,395)">
    <path d="M0 40 Q40 60 80 40 L72 5 Q40 -8 8 5 Z" fill="#B98A4C"/>
    <path d="M4 15 Q40 2 76 15" stroke="#7A5A2E" stroke-width="2" fill="none"/>
    <path d="M2 27 Q40 14 78 27" stroke="#7A5A2E" stroke-width="2" fill="none"/>
  </g>

  <!-- Natte avec grains de maïs étalés à sécher -->
  <g transform="translate(230,420)">
    <ellipse cx="180" cy="55" rx="230" ry="42" fill="#E8D8B0"/>
    <ellipse cx="180" cy="55" rx="230" ry="42" fill="none" stroke="#C9AF7C" stroke-width="3"/>
    <g fill="#E8AC3D" stroke="#C98E23" stroke-width="0.6">
      <ellipse cx="60" cy="45" rx="7" ry="5"/><ellipse cx="80" cy="55" rx="7" ry="5"/>
      <ellipse cx="100" cy="42" rx="7" ry="5"/><ellipse cx="120" cy="58" rx="7" ry="5"/>
      <ellipse cx="140" cy="46" rx="7" ry="5"/><ellipse cx="160" cy="60" rx="7" ry="5"/>
      <ellipse cx="180" cy="44" rx="7" ry="5"/><ellipse cx="200" cy="57" rx="7" ry="5"/>
      <ellipse cx="220" cy="48" rx="7" ry="5"/><ellipse cx="240" cy="60" rx="7" ry="5"/>
      <ellipse cx="260" cy="45" rx="7" ry="5"/><ellipse cx="280" cy="56" rx="7" ry="5"/>
      <ellipse cx="300" cy="47" rx="7" ry="5"/><ellipse cx="90" cy="65" rx="7" ry="5"/>
      <ellipse cx="150" cy="68" rx="7" ry="5"/><ellipse cx="210" cy="68" rx="7" ry="5"/>
      <ellipse cx="270" cy="66" rx="7" ry="5"/><ellipse cx="130" cy="35" rx="7" ry="5"/>
      <ellipse cx="190" cy="33" rx="7" ry="5"/><ellipse cx="250" cy="36" rx="7" ry="5"/>
    </g>
  </g>

  <!-- Silhouette : vieille femme penchée, étalant le maïs -->
  <g transform="translate(300,300)">
    <!-- pagne / robe -->
    <path d="M60 40 C 30 45, 15 90, 25 140 C 30 165, 90 168, 100 140 C 112 95, 100 50, 60 40 Z" fill="#C1622D"/>
    <path d="M60 40 C 30 45, 15 90, 25 140" fill="none" stroke="#A34F22" stroke-width="2" opacity="0.5"/>
    <!-- motif du pagne -->
    <path d="M35 90 Q60 100 90 90" stroke="#F0E6D2" stroke-width="4" fill="none" opacity="0.8"/>
    <path d="M30 115 Q60 126 95 115" stroke="#F0E6D2" stroke-width="4" fill="none" opacity="0.8"/>
    <!-- buste penché en avant -->
    <path d="M55 40 C 40 20, 70 -5, 100 5 C 120 12, 118 35, 100 42 C 85 47, 65 48, 55 40 Z" fill="#8A5A3A"/>
    <!-- foulard sur la tête -->
    <path d="M92 -8 C 108 -18, 128 -10, 130 6 C 132 18, 118 22, 108 18 C 118 14, 118 2, 105 -2 C 98 -4, 92 -2, 92 -8 Z" fill="#355E3B"/>
    <circle cx="108" cy="8" r="13" fill="#8A5A3A"/>
    <!-- bras tendu vers la natte -->
    <path d="M118 20 C 140 25, 158 38, 168 52" stroke="#8A5A3A" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M45 32 C 25 30, 8 40, 2 55" stroke="#8A5A3A" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- jambes / pieds nus -->
    <ellipse cx="45" cy="168" rx="12" ry="6" fill="#6B4226"/>
    <ellipse cx="85" cy="168" rx="12" ry="6" fill="#6B4226"/>
  </g>

  <!-- Poules picorant -->
  <g transform="translate(560,470)" fill="#F0E6D2">
    <ellipse cx="0" cy="8" rx="14" ry="10"/>
    <circle cx="12" cy="0" r="6"/>
    <path d="M18 0 l7 2 l-7 3 Z" fill="#C1622D"/>
  </g>
  <g transform="translate(600,485) scale(0.8)" fill="#E8D8B0">
    <ellipse cx="0" cy="8" rx="14" ry="10"/>
    <circle cx="12" cy="0" r="6"/>
    <path d="M18 0 l7 2 l-7 3 Z" fill="#C1622D"/>
  </g>

  <!-- Sacs de grain empilés -->
  <g transform="translate(60,430)">
    <path d="M0 60 Q-4 20 20 15 Q44 20 40 60 Q20 75 0 60 Z" fill="#D8A15C"/>
    <path d="M2 55 Q-2 25 20 20 Q42 25 38 55" fill="none" stroke="#B27E3F" stroke-width="2"/>
    <path d="M8 12 Q20 2 32 12" fill="none" stroke="#8A5A2B" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(105,445)">
    <path d="M0 50 Q-3 16 17 12 Q37 16 34 50 Q17 62 0 50 Z" fill="#C1622D"/>
    <path d="M6 10 Q17 2 28 10" fill="none" stroke="#8A5A2B" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
